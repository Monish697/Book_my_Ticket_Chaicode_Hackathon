<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Stellar Seat Booking - Auth</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
            body {
                font-family: "Outfit", sans-serif;
                background-color: #0f172a;
                color: #f8fafc;
            }
        </style>
    </head>
    <body
        class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
    >
        <div
            class="max-w-md w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50"
        >
            <div class="text-center mb-10">
                <h1
                    class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4 tracking-tight"
                >
                    ChaiCode Cinema - Authentication
                </h1>
                <p class="text-slate-400 text-lg">
                    Register or Login to book your seats
                </p>
            </div>

            <div class="flex justify-center mb-8">
                <div
                    class="bg-slate-900/50 rounded-full p-1 border border-slate-700 flex"
                >
                    <button
                        id="registerTab"
                        class="px-6 py-2 rounded-full font-medium transition-all duration-300 text-emerald-400 bg-emerald-500/20"
                    >
                        Register
                    </button>
                    <button
                        id="loginTab"
                        class="px-6 py-2 rounded-full font-medium transition-all duration-300 text-slate-400 hover:text-cyan-400"
                    >
                        Login
                    </button>
                </div>
            </div>

            <div
                id="registerFormContainer"
                class="bg-slate-900/40 p-8 rounded-2xl border border-slate-700/50 shadow-inner"
            >
                <h2
                    class="text-2xl font-bold text-emerald-400 mb-6 text-center"
                >
                    Register
                </h2>
                <form id="registerForm" class="space-y-4">
                    <div>
                        <label
                            for="regFirstName"
                            class="block text-slate-300 mb-2"
                            >First Name</label
                        >
                        <input
                            type="text"
                            id="regFirstName"
                            name="firstName"
                            required
                            minlength="2"
                            maxlength="50"
                            class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                            placeholder="Enter your first name"
                        />
                    </div>
                    <div>
                        <label
                            for="regLastName"
                            class="block text-slate-300 mb-2"
                            >Last Name</label
                        >
                        <input
                            type="text"
                            id="regLastName"
                            name="lastName"
                            required
                            minlength="2"
                            maxlength="50"
                            class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                            placeholder="Enter your last name"
                        />
                    </div>
                    <div>
                        <label for="regEmail" class="block text-slate-300 mb-2"
                            >Email</label
                        >
                        <input
                            type="email"
                            id="regEmail"
                            name="email"
                            required
                            class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                            placeholder="Enter your email"
                        />
                    </div>
                    <div>
                        <label
                            for="regPassword"
                            class="block text-slate-300 mb-2"
                            >Password</label
                        >
                        <input
                            type="password"
                            id="regPassword"
                            name="password"
                            required
                            minlength="8"
                            title="Password must contain at least one uppercase letter and one digit"
                            class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                            placeholder="Enter your password"
                        />
                    </div>

                    <button
                        type="submit"
                        class="w-full py-3 bg-emerald-500 text-white font-bold rounded-xl hover:bg-emerald-400 transition-colors duration-300 shadow-lg hover:shadow-emerald-500/25"
                    >
                        Register
                    </button>
                </form>
            </div>

            <div
                id="loginFormContainer"
                class="bg-slate-900/40 p-8 rounded-2xl border border-slate-700/50 shadow-inner hidden"
            >
                <h2 class="text-2xl font-bold text-cyan-400 mb-6 text-center">
                    Login
                </h2>
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label
                            for="loginEmail"
                            class="block text-slate-300 mb-2"
                            >Email</label
                        >
                        <input
                            type="email"
                            id="loginEmail"
                            name="email"
                            required
                            class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                            placeholder="Enter your email"
                        />
                    </div>
                    <div>
                        <label
                            for="loginPassword"
                            class="block text-slate-300 mb-2"
                            >Password</label
                        >
                        <input
                            type="password"
                            id="loginPassword"
                            name="password"
                            required
                            class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                            placeholder="Enter your password"
                        />
                    </div>
                    <button
                        type="submit"
                        class="w-full py-3 bg-cyan-500 text-white font-bold rounded-xl hover:bg-cyan-400 transition-colors duration-300 shadow-lg hover:shadow-cyan-500/25"
                    >
                        Login
                    </button>
                </form>
            </div>
        </div>

        <script>
            const registerTab = document.getElementById("registerTab");
            const loginTab = document.getElementById("loginTab");
            const registerForm = document.getElementById(
                "registerFormContainer",
            );
            const loginForm = document.getElementById("loginFormContainer");

            registerTab.addEventListener("click", () => {
                registerTab.classList.add(
                    "text-emerald-400",
                    "bg-emerald-500/20",
                );
                registerTab.classList.remove("text-slate-400");
                loginTab.classList.remove("text-cyan-400", "bg-cyan-500/20");
                loginTab.classList.add("text-slate-400");
                registerForm.classList.remove("hidden");
                loginForm.classList.add("hidden");
            });

            loginTab.addEventListener("click", () => {
                loginTab.classList.add("text-cyan-400", "bg-cyan-500/20");
                loginTab.classList.remove("text-slate-400");
                registerTab.classList.remove(
                    "text-emerald-400",
                    "bg-emerald-500/20",
                );
                registerTab.classList.add("text-slate-400");
                loginForm.classList.remove("hidden");
                registerForm.classList.add("hidden");
            });

            document
                .getElementById("registerForm")
                .addEventListener("submit", async function (e) {
                    e.preventDefault();
                    const formData = new FormData(this);
                    const data = Object.fromEntries(formData);
                    try {
                        const response = await fetch("/auth/register", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify(data),
                        });

                        const result = await response.json();
                        if (response.ok) {
                            localStorage.setItem("token", result.token);
                            window.location.href = "/booking";
                        } else {
                            alert(
                                "Registration failed: " +
                                    (result.message || "Unknown error"),
                            );
                        }
                    } catch (error) {
                        alert("Error: " + error.message);
                    }
                });

            document
                .getElementById("loginForm")
                .addEventListener("submit", async function (e) {
                    e.preventDefault();
                    const formData = new FormData(this);
                    const data = Object.fromEntries(formData);

                    try {
                        const response = await fetch("/auth/login", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify(data),
                        });

                        const result = await response.json();
                        if (response.ok) {
                            localStorage.setItem("token", result.token);
                            window.location.href = "/booking";
                        } else {
                            alert(
                                "Login failed: " +
                                    (result.message || "Unknown error"),
                            );
                        }
                    } catch (error) {
                        alert("Error: " + error.message);
                    }
                });
        </script>
    </body>
</html>
